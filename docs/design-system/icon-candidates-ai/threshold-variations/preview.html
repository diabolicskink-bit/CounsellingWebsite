<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Threshold icon variations</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f231f;
        --body: #3f493f;
        --paper: #f7f6f2;
        --surface: #eef2ec;
        --line: #ccd4ca;
        --cedar: #234b3d;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 980px);
        margin: 48px auto;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 6vw, 3.4rem);
        font-weight: 500;
        line-height: 1;
      }

      p {
        max-width: 68ch;
        margin: 0 0 28px;
        color: var(--body);
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        background: #fcfcfa;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 12px;
        background: var(--surface);
      }

      figcaption {
        margin-top: 12px;
        color: var(--cedar);
        font-size: 0.9rem;
        font-weight: 700;
      }

      code {
        display: block;
        margin-top: 4px;
        color: var(--body);
        font-size: 0.78rem;
        font-weight: 500;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Threshold variations</h1>
      <p>Four raster image-generation variations. These are not wired into the live site assets.</p>
      <section class="grid" aria-label="Threshold icon variations">
        <figure>
          <img src="threshold-variation-01-flat.png" alt="Threshold variation 01, flat" />
          <figcaption>01 Flat<code>threshold-variation-01-flat.png</code></figcaption>
        </figure>
        <figure>
          <img src="threshold-variation-02-flat-bold.png" alt="Threshold variation 02, flat bold" />
          <figcaption>02 Flat bold<code>threshold-variation-02-flat-bold.png</code></figcaption>
        </figure>
        <figure>
          <img src="threshold-variation-03-3d-carved.png" alt="Threshold variation 03, 3D carved" />
          <figcaption>03 3D carved<code>threshold-variation-03-3d-carved.png</code></figcaption>
        </figure>
        <figure>
          <img src="threshold-variation-04-3d-paper-model.png" alt="Threshold variation 04, 3D paper model" />
          <figcaption>04 3D paper model<code>threshold-variation-04-3d-paper-model.png</code></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vive AI icon candidates</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f231f;
        --body: #3f493f;
        --paper: #f7f6f2;
        --surface: #eef2ec;
        --line: #ccd4ca;
        --cedar: #234b3d;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 1180px);
        margin: 48px auto;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 6vw, 3.4rem);
        font-weight: 500;
        line-height: 1;
      }

      p {
        max-width: 70ch;
        margin: 0 0 28px;
        color: var(--body);
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        background: #fcfcfa;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 12px;
        background: var(--surface);
      }

      figcaption {
        margin-top: 12px;
        color: var(--cedar);
        font-size: 0.9rem;
        font-weight: 700;
      }

      code {
        display: block;
        margin-top: 4px;
        color: var(--body);
        font-size: 0.78rem;
        font-weight: 500;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>

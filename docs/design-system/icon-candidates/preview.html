<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vive icon candidates</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f231f;
        --body: #3f493f;
        --paper: #f7f6f2;
        --surface: #eef2ec;
        --line: #ccd4ca;
        --cedar: #234b3d;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 1100px);
        margin: 48px auto;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 6vw, 3.4rem);
        font-weight: 500;
        line-height: 1;
      }

      p {
        max-width: 68ch;
        margin: 0 0 28px;
        color: var(--body);
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        background: #fcfcfa;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 12px;
        background: var(--surface);
      }

      figcaption {
        margin-top: 12px;
        color: var(--cedar);
        font-size: 0.9rem;
        font-weight: 700;
      }

      code {
        display: block;
        margin-top: 4px;
        color: var(--body);
        font-size: 0.78rem;
        font-weight: 500;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vive icon candidates</h1>
      <p>Standalone SVG concepts only. These are not wired into the live site assets.</p>
      <section class="grid" aria-label="Icon candidates">
        <figure>
          <img src="vive-icon-01-threshold.svg" alt="Icon candidate 01" />
          <figcaption>01 Threshold<code>vive-icon-01-threshold.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-02-open-vessel.svg" alt="Icon candidate 02" />
          <figcaption>02 Open vessel<code>vive-icon-02-open-vessel.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-03-quiet-room.svg" alt="Icon candidate 03" />
          <figcaption>03 Quiet room<code>vive-icon-03-quiet-room.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-04-cut-stone.svg" alt="Icon candidate 04" />
          <figcaption>04 Cut stone<code>vive-icon-04-cut-stone.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-05-plain-wordmark-v.svg" alt="Icon candidate 05" />
          <figcaption>05 Plain V<code>vive-icon-05-plain-wordmark-v.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-06-between-lines.svg" alt="Icon candidate 06" />
          <figcaption>06 Between lines<code>vive-icon-06-between-lines.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-07-ink-and-paper.svg" alt="Icon candidate 07" />
          <figcaption>07 Ink and paper<code>vive-icon-07-ink-and-paper.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-08-compass-v.svg" alt="Icon candidate 08" />
          <figcaption>08 Compass V<code>vive-icon-08-compass-v.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-09-uneven-ground.svg" alt="Icon candidate 09" />
          <figcaption>09 Uneven ground<code>vive-icon-09-uneven-ground.svg</code></figcaption>
        </figure>
        <figure>
          <img src="vive-icon-10-listening-mark.svg" alt="Icon candidate 10" />
          <figcaption>10 Listening mark<code>vive-icon-10-listening-mark.svg</code></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
